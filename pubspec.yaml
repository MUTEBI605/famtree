name: famtree
description: FAMTREE - The Living Family Tree

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3
  graphview: ^1.5.1
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  uuid: ^4.5.0
  intl: ^0.19.0
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  table_calendar: ^3.1.2
  revenuecat_purchases_flutter: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.12

flutter:
  uses-material-design: true
  assets:
    - assets/
